extraction:
  # SUPERSEDED: running_header_top_pts was used by the pdfplumber-based
  # extractor.  pymupdf4llm strips running headers via regex patterns in
  # extractor._strip_running_headers() instead.  Kept here so any external
  # tooling that reads this key does not break.
  running_header_top_pts: 40

  # Sections to drop from the cleaned output (case-insensitive substring match
  # against detected section headers).  Works with both plain-text and
  # markdown heading formats (e.g. "#### DISCLOSURE").
  # Add new entries here when ingesting documents with different noise-section
  # names — no code changes required.
  exclude_sections:
    - "REFERENCES"
    - "DISCLOSURE"
    - "CONFLICT OF INTEREST"
    - "ACKNOWLEDGMENT"
    - "SUPPLEMENTARY"
    - "AUTHOR CONTRIBUTION"

# SUPERSEDED: table_linearization settings were used by table_handler.py with
# the pdfplumber backend.  pymupdf4llm handles table linearisation internally
# via its ML layout model.  Retained for reference; not read by the pipeline.
table_linearization:
  max_header_cell_len: 80
  dedup_min_len: 20

# SUPERSEDED: figure_detection coordinate settings were used by figure_handler.py
# with the pdfplumber backend.  pymupdf4llm detects figure regions internally.
# render_scale and the vision block below are retained for the optional vision-LLM
# figure-description enhancement (planned for a future pass).
figure_detection:
  bbox_padding_pts: 25
  bbox_padding_bottom_pts: 120
  min_rect_dimension: 5
  min_rects_in_cluster: 3
  cluster_proximity_pts: 60
  min_cluster_area_pts2: 4000
  render_scale: 2.0

quality_gate:
  # Hard fail: extracted text shorter than this is almost certainly broken.
  min_content_chars: 5000

  # Hard fail: fraction of all whitespace-delimited tokens that are long
  # all-letter strings with no spaces (word-glue detector).
  # Threshold of 15 chars catches medium-glue like "Thegoaloftreatment" (18)
  # while leaving legitimate long medical terms alone — those typically
  # contain uppercase letters, digits, or hyphens and fail the all-[A-Za-z]
  # regex in the gate check.
  word_glue_min_len: 15        # tokens longer than this are suspect
  word_glue_max_ratio: 0.02    # allow up to 2 % after fitz word-extraction fix

  # Warning only: fraction of non-empty lines that are very short.
  # Some short lines are expected (figure captions, page tags, table cells).
  short_line_max_ratio: 0.25

  # Hard fail: fraction of test-set keywords that must appear in the text.
  # Set below 1.0 to allow for:
  #   - Keywords that are paraphrases/summaries rather than exact quotes
  #     (e.g. "glucocorticoid toxicity" vs "toxicity of systemic glucocorticoids")
  #   - Minor word-glue in non-critical areas (table cells, figure captions)
  #   - Hyphenated line-breaks that span word boundaries
  keyword_coverage_min: 0.75

vision:
  model: "gpt-4o-mini"
  max_tokens: 600
  # Prompt sent to the vision LLM for every detected figure region.
  # Written to produce dense, retrieval-friendly prose.
  prompt: >
    This image is a cropped region from a clinical medical guideline PDF.
    Describe its content in complete, plain prose so that someone who cannot
    see the image can fully understand it.
    Include every text label visible in the image verbatim, the logical and
    flow relationships between elements (for example: "Box A leads to Box B
    when condition X is met"), and the overall clinical purpose of the figure.
    Do not use markdown, bullet points, or headers — write in continuous prose.
